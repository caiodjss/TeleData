<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleData Treinamentos - Login</title>
    <link rel="stylesheet" href="../styles/login.css">
</head>
<body>
    <header>
        <a href="../index.html" class="logo">
            <img src="../img/logo-female.png" alt="TeleData Logo">
        </a>
        
        <div class="search-container">
            <input type="text" placeholder="Pesquisar cursos..." class="search-input">
            <button type="submit" class="search-button">
                <img src="../img/lupa.png" alt="Pesquisar">
            </button>
        </div>

        <nav>
            <img class="cart" src="../img/carrinho.png" alt="Carrinho de compras">
            <button class="btn-cadastro" onclick="window.location.href='cadastro.html'">Cadastrar</button> 
        </nav>
    </header>
    
<div class="container">
        <div class="login-box">
            <h2>Login</h2>
            <form id="loginForm" action="http://localhost:3000/login" method="POST">
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="Seu endereço de e-mail" 
                        required
                    >
                </div>
                
                <div class="input-group">
                    <label for="password">Senha</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Sua senha" 
                        minlength="6" 
                        required
                    >
                </div>
                
                <div class="remember-forgot">
                    <label class="checkbox-container">
                        <input type="checkbox" id="remember" name="remember">
                        <span class="checkmark"></span>
                        Lembrar-me
                    </label>
                    <a href="pages/recuperar-senha.html" class="forgot-password">Esqueci minha senha</a>
                </div>
                
                <button type="submit" class="btn-entrar">Entrar</button>
                
                <div class="separator">
                    <span>ou</span>
                </div>
            </form>
            
            <div class="register-link">
                <p>Não tem uma conta? <a href="cadastro.html">Cadastre-se agora</a></p>
            </div>
        </div>
    </div>
    
    <footer>
        <div class="footer-links">
            <a href="#">Sobre a TeleData Treinamentos</a>
            <a href="#">Central de Ajuda</a>
            <a href="#">Termos de Serviço</a>
        </div>
        <div class="social-icons">
            <img src="../img/github.png" alt="GitHub">
            <img src="../img/instagram.png" alt="Instagram">
        </div>
    </footer>
    
    <script src="scripts/script.js"></script>
</body>
</html>
