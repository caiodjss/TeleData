<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleData Treinamentos - Home</title>
    <link rel="stylesheet" href="styles/cadastro.css">
</head>
<body>
     <header>
        <div class="logo">
            <img src="img/logo-male.png" alt="TeleData Logo">
        </div>
        <nav>
            <a href="pages/planos.html">Planos</a>
            <img class="cart" src="img/carrinho.png" alt="Carrinho">
            <button class="btn-login" onclick="window.location.href='pages/login.html'">Fazer Login</button>
            <button class="btn-cadastro" nclick="window.location.href='pages/cadastro.html'">Cadastrar</button> 
        </nav>
    </header>
    <div class="container">
        <div class="logo-background">
            <img src="img/logo-female.png alt="Ilustração>
        </div>
        <div class="login-box">
            <h2>Cadastre-se</h2>
            <form action="dashboard.html"> <!-- ou a página de destino após cadastro -->
                <input type="text" placeholder="Nome completo" required>
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Senha (mínimo 8 caracteres)" required>
                <button type="submit" class="btn-entrar">Cadastrar</button>
            </form>
            <br>
            <p>Já tem cadastro?</p><a href="pages/login.html"> Fazer Login</a>
        </div>
    </div>
    <footer>
        <div class="footer-links">
            <a href="#">Sobre a TeleData Treinamentos</a>
            <a href="#">Central de Ajuda</a>
            <a href="#">Termos de Serviço</a>
        </div>
        <div class="social-icons">
            <img src="img/github" alt="GitHub">
            <img src="img/instagram.png" alt="Instagram">
        </div>
    </footer>
</body>
    <script src="scripts/script.js"></script>
</html>
