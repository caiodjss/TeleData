<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleData Treinamentos - Home</title>
    <link rel="stylesheet" href="styles/index.css">
</head>
<body>
    <header>
        <a href="#" class="logo"></a>
        <div class="logo">
            <img src="img/logo-female.png" alt="TeleData Logo">
        </div>
        
        <div class="search-container">
            <input type="text" placeholder="Pesquisar cursos..." class="search-input">
            <button type="submit" class="search-button">
                <img src="img/lupa.png" alt="Pesquisar">
            </button>
        </div>

        <nav>
            <a href="pages/planos.html">Planos</a>
            <img class="cart" src="img/carrinho.png" alt="Carrinho de compras">
            <button class="btn-login" onclick="window.location.href='pages/login.html'">Fazer Login</button>
            <button class="btn-cadastro" onclick="window.location.href='pages/cadastro.html'">Cadastrar</button> 
        </nav>
    </header>
    
    <main>
        <div class="container">
            <div class="logo-background">
                <img src="img/logo-male.png" alt="Ilustração TeleData">
            </div>
            <div class="login-box">
                <h2>Cadastre-se</h2>
                <form action="dashboard.html">
                    <input type="text" placeholder="Nome completo" required>
                    <input type="email" placeholder="Email" required>
                    <input type="password" placeholder="Senha (mínimo 8 caracteres)" required minlength="8">
                    <button type="submit" class="btn-entrar">Cadastrar</button>
                </form>
                <br>
                <p>Já tem cadastro? <a href="pages/login.html">Fazer Login</a></p>
            </div>
        </div>
    </main>
    
    <footer>
        <div class="footer-links">
            <a href="#">Sobre a TeleData Treinamentos</a>
            <a href="#">Central de Ajuda</a>
            <a href="#">Termos de Serviço</a>
        </div>
        <div class="social-icons">
            <img src="img/github.png" alt="GitHub">
            <img src="img/instagram.png" alt="Instagram">
        </div>
    </footer>
    
    <script src="../frontend/scripts/script.js"></script>
</body>
</html>
